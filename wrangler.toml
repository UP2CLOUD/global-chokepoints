# ============================================================
# Cloudflare Pages configuration (next-on-pages adapter)
# Docs: https://developers.cloudflare.com/pages/framework-guides/nextjs/
#
# Setup checklist (one-time):
#   1. Install wrangler:   npm install -g wrangler
#   2. Login:              wrangler login
#   3. Create Pages project: wrangler pages project create strait-of-hormuz-monitor
#   4. Create D1 DB:       wrangler d1 create strait-subscriptions
#      → database_id is already filled in below
#   5. Run migration:      npm run db:migrate
#   6. Add secrets (use wrangler pages secret put):
#        wrangler pages secret put RESEND_API_KEY
#        wrangler pages secret put ALERT_CRON_SECRET
#        wrangler pages secret put AISSTREAM_KEY
#        wrangler pages secret put EIA_API_KEY
#        wrangler pages secret put RESEND_FROM_EMAIL
#   7. Deploy:             npm run deploy:cf
# ============================================================

name = "global-chokepoints"
pages_build_output_dir = ".vercel/output/static"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# ── Cloudflare D1 (SQLite) — email subscriptions ─────────────
[[d1_databases]]
binding = "DB"
database_name = "strait-subscriptions"
database_id = "27666582-3b79-4e35-bce0-961f37ea655a"

# Migrations: npm run db:migrate (runs 0001 + 0002 against remote DB)
# Local:      npm run db:migrate:local

# ── Cloudflare KV — persistent API response cache ────────────
[[kv_namespaces]]
binding = "HORMUZ_KV"
id = "015d621e444a42d0a18a07bcb6dc0188"

# ── Public environment variables ─────────────────────────────
[vars]
NEXT_PUBLIC_SITE_URL = "https://global-chokepoints.pages.dev"
NEXT_PUBLIC_ADS_ENABLED = "true"

# ── Cron Trigger — alert check every 10 min ──────────────────
[[triggers]]
crons = ["*/10 * * * *"]
