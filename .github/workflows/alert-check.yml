# ============================================================
# Hourly alert check fallback
#
# This is a GitHub Actions fallback for environments where the
# Cloudflare Cron Trigger (configured in wrangler.toml) is not
# running (e.g. during local testing or if the CF project is paused).
#
# On Cloudflare Pages, the cron trigger in wrangler.toml fires every
# 10 minutes and calls /api/alert-check directly.  This GHA runs
# hourly as a backup so no status change goes unnoticed.
#
# Required secrets (Settings → Secrets → Actions):
#   ALERT_CRON_SECRET  — must match the CF Workers secret of the same name
#
# Optional repository variables (Settings → Variables → Actions):
#   NEXT_PUBLIC_SITE_URL  — production URL (default: pages.dev subdomain)
# ============================================================

name: Hourly Alert Check

on:
  schedule:
    - cron: '0 * * * *'   # every hour at :00
  workflow_dispatch:        # manual trigger for testing

jobs:
  check:
    name: Check strait status & send alerts
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Validate secrets
        id: check_secrets
        run: |
          if [ -z "${ALERT_SECRET}" ]; then
            echo "::warning::ALERT_CRON_SECRET is not configured in GitHub Secrets — skipping alert check."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          ALERT_SECRET: ${{ secrets.ALERT_CRON_SECRET }}

      - name: Sync ALERT_CRON_SECRET to Cloudflare Pages
        if: steps.check_secrets.outputs.skip == 'false' && secrets.CLOUDFLARE_API_TOKEN != ''
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          ALERT_CRON_SECRET: ${{ secrets.ALERT_CRON_SECRET }}
        run: |
          echo "$ALERT_CRON_SECRET" | npx wrangler pages secret put ALERT_CRON_SECRET \
            --project-name=global-chokepoints

      - name: Trigger alert-check endpoint
        if: steps.check_secrets.outputs.skip == 'false'
        env:
          ALERT_SECRET: ${{ secrets.ALERT_CRON_SECRET }}
        run: |
          SITE="${{ vars.NEXT_PUBLIC_SITE_URL || 'https://global-chokepoints.pages.dev' }}"
          echo "POST ${SITE}/api/alert-check"

          HTTP_STATUS=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            -X POST \
            -H "Content-Type: application/json" \
            -H "X-Alert-Secret: ${ALERT_SECRET}" \
            --max-time 30 \
            "${SITE}/api/alert-check")

          echo "HTTP ${HTTP_STATUS}"
          python3 -m json.tool /tmp/response.json 2>/dev/null || cat /tmp/response.json

          if [ "${HTTP_STATUS}" != "200" ]; then
            echo "::error::Alert check returned HTTP ${HTTP_STATUS}"
            exit 1
          fi
