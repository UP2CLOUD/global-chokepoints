# ============================================================
# Deploy to Cloudflare Pages
#
# Triggers:   push to main  |  manual (workflow_dispatch)
# Builds:     @cloudflare/next-on-pages  →  .vercel/output/static
# Deploys:    wrangler pages deploy
#
# Required repository secrets (Settings → Secrets → Actions):
#   CLOUDFLARE_API_TOKEN   — CF API token with Pages:Edit permission
#   CLOUDFLARE_ACCOUNT_ID  — Your Cloudflare account ID
#
# Optional repository variables (Settings → Variables → Actions):
#   NEXT_PUBLIC_SITE_URL   — Public URL (default: global-chokepoints.pages.dev)
# ============================================================

name: Deploy → Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Restore Next.js build cache
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**/*.[jt]s', '**/*.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-

      - name: Type-check
        run: npm run type-check

      - name: Build for Cloudflare Pages
        run: npm run build:cf
        env:
          NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL || 'https://global-chokepoints.pages.dev' }}
          NEXT_PUBLIC_ADS_ENABLED: 'true'

      - name: Deploy to Cloudflare Pages
        if: ${{ secrets.CLOUDFLARE_API_TOKEN != '' }}
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy .vercel/output/static --project-name=global-chokepoints

      - name: Skip deploy (no CF credentials)
        if: ${{ secrets.CLOUDFLARE_API_TOKEN == '' }}
        run: echo "::warning::CLOUDFLARE_API_TOKEN not configured — skipping Cloudflare Pages deploy"

      - name: Sync secrets to Cloudflare Pages
        if: ${{ secrets.CLOUDFLARE_API_TOKEN != '' && secrets.ALERT_CRON_SECRET != '' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          ALERT_CRON_SECRET: ${{ secrets.ALERT_CRON_SECRET }}
        run: |
          echo "$ALERT_CRON_SECRET" | npx wrangler pages secret put ALERT_CRON_SECRET \
            --project-name=global-chokepoints
